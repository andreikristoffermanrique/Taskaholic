<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskaholic - Shared Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Laila:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar Panel -->
        <aside class="sidebar-panel">
            <div class="brand-wrapper">
                <img src="LOGO 2.png" alt="Taskaholic Logo" class="brand-logo-img">
                <span class="brand-title">Taskaholic</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="workload.html" class="nav-item">
                    <i class="fa-solid fa-book-open"></i> Workload Overview
                </a>
                <a href="Dashboard.html" class="nav-item">
                    <i class="fa-solid fa-table-cells-large"></i> Dashboard
                </a>
                <a href="my_tasks.html" class="nav-item">
                    <i class="fa-solid fa-clapperboard"></i> My Tasks
                </a>
                <a href="shared_task.html" class="nav-item active">
                    <i class="fa-solid fa-user-group"></i> Shared Tasks
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fa-solid fa-bell"></i> Notifications
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fa-solid fa-circle-user"></i> Profile
                </a>
            </nav>

            <a href="login.html" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </a>
        </aside>

        <!-- Main Workspace Area -->
        <main class="main-content" style="background-color: #FCF8F8; padding: 30px;">
            <header class="content-header" style="margin-bottom: 25px;">
                <div class="welcome-text">
                    <h2 style="display: flex; align-items: center; gap: 10px; color: #000000; margin: 0;">
                        <i class="fa-solid fa-user-group"></i> Shared Tasks
                    </h2>
                    <p style="font-size: 13px; color: #555555; margin: 4px 0 0 0;">Tasks you are collaborating on</p>
                </div>
            </header>

            <!-- Navigation Tabs Group -->
            <div style="display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #EAEAEA; padding-bottom: 10px;">
                <button id="tabSharedTasks" class="filter-btn active" style="background-color: #F5AFAF; border: 1px solid #000; border-radius: 8px; padding: 10px 24px; font-weight: 600; cursor: pointer;">Shared Tasks</button>
                <button id="tabInvitations" class="filter-btn" style="background-color: #FFFFFF; border: 1px solid #000; border-radius: 8px; padding: 10px 24px; font-weight: 500; cursor: pointer;">Invitations</button>
            </div>

            <!-- VIEW 1: SHARED TASKS BOARD -->
            <div id="view-shared-tasks" style="display: block;">
                <div style="background: #fff; border: 1px solid #F4B2BB; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
                    <div id="sharedBoardContent" style="display: flex; flex-direction: column; gap: 12px;">
                        <p style="text-align: center; color: gray; padding: 20px;">Loading shared tasks...</p>
                    </div>
                </div>
            </div>

            <!-- VIEW 2: INVITATIONS MANAGER PANEL -->
            <div id="view-invitations" style="display: none;">
                <!-- Incoming Invites Container -->
                <div id="invitations-list" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;">
                    <p style="text-align: center; color: gray; padding: 20px;">Loading incoming invitations...</p>
                </div>

                <!-- Form Layout Box -->
                <div style="background: #fff; border: 1px solid #F4B2BB; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
                    <h3 style="margin: 0 0 6px 0; font-size: 16px; font-weight: 700; color: #000;">Invite a New Collaborator</h3>
                    <p style="font-size: 12px; color: #666; margin: 0 0 20px 0;">Send an invitation to another institutional student user.</p>
                    
                    <!-- Clean Aligned Form Row -->
                    <div style="display: flex; gap: 12px; align-items: center; width: 100%; box-sizing: border-box;">
                        <input type="email" id="quickInviteEmail" placeholder="student@gbox.adnu.edu.ph" style="flex: 2; padding: 12px 14px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; box-sizing: border-box;">
                        
                        <select id="quickInviteRole" style="flex: 1; padding: 12px 14px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-family: 'Inter', sans-serif; font-size: 14px; box-sizing: border-box; min-width: 120px;">
                            <option>Can Edit</option>
                            <option>Can View</option>
                        </select>
                        
                        <button id="quickInviteBtn" style="flex: 1; background-color: #FBEFEF; border: 1px solid #000; border-radius: 8px; padding: 12px 20px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; white-space: nowrap; box-sizing: border-box;">
                            Send Invitation
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="shared_task.js"></script>
</body>
</html>
