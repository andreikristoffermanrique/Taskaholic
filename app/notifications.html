<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskaholic - Notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Laila:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar-panel">
            <div class="brand-wrapper">
                <img src="LOGO 2.png" alt="Taskaholic Logo" class="brand-logo-img">
                <span class="brand-title">Taskaholic</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="workload.html" class="nav-item">
                    <i class="fa-solid fa-book-open"></i> Workload Overview
                </a>
    
                <a href="Dashboard.html" class="nav-item">
                    <i class="fa-solid fa-table-cells-large"></i> Dashboard
                </a>
    
                <a href="my_tasks.html" class="nav-item">
                    <i class="fa-solid fa-clapperboard"></i> My Tasks
                </a>
    
                <a href="shared_task.html" class="nav-item">
                    <i class="fa-solid fa-user-group"></i> Shared Tasks
                </a>
    
                <a href="notifications.html" class="nav-item active">
                    <i class="fa-solid fa-bell"></i> Notifications
                </a>
    
                <a href="settings.html" class="nav-item">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
    
                <a href="profile.html" class="nav-item">
                    <i class="fa-solid fa-circle-user"></i> Profile
                </a>
            </nav>

            <a href="login.html" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </a>
        </aside>

        <main class="main-content" style="background-color: #FCF8F8;">
            <header class="content-header" style="margin-bottom: 25px;">
                <div class="welcome-text">
                    <h2 style="display: flex; align-items: center; gap: 10px; color: #000000;">
                        <i class="fa-regular fa-bell"></i> Notifications
                    </h2>
                    <p style="font-size: 13px; color: #555555; margin-top: 4px;">Stay connected with your tasks and activities</p>
                </div>
            </header>

            <div style="max-width: 800px; width: 100%;">
                
                <div id="filter-tabs" style="background-color: #FBEFEF; border-radius: 8px; padding: 12px 20px; display: flex; gap: 20px; margin-bottom: 20px;">
                    <button class="filter-btn active" data-filter="all" style="background-color: #F5AFAF; border: 1px solid #000000; border-radius: 20px; padding: 6px 28px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: #000000; cursor: pointer; transition: 0.2s;">All</button>
                    <button class="filter-btn" data-filter="reminders" style="background-color: #FFFFFF; border: 1px solid #000000; border-radius: 20px; padding: 6px 28px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #000000; cursor: pointer; transition: 0.2s;">Reminders</button>
                    <button class="filter-btn" data-filter="updates" style="background-color: #FFFFFF; border: 1px solid #000000; border-radius: 20px; padding: 6px 28px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #000000; cursor: pointer; transition: 0.2s;">Updates</button>
                    <button class="filter-btn" data-filter="invitations" style="background-color: #FFFFFF; border: 1px solid #000000; border-radius: 20px; padding: 6px 28px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #000000; cursor: pointer; transition: 0.2s;">Invitations</button>
                </div>

                <div id="notifications-feed" style="display: flex; flex-direction: column; gap: 14px;">
                    </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Fetch user and tasks from localStorage
            const activeUser = JSON.parse(localStorage.getItem('currentUser')) || null;
            const globalTasks = JSON.parse(localStorage.getItem('tasks')) || [];
            
            // Filter tasks for the logged-in user (if auth is setup)
            let userTasks = globalTasks;
            if (activeUser && activeUser.email) {
                userTasks = globalTasks.filter(t => t.owner === activeUser.email);
            }

            const todayStr = new Date().toISOString().split('T')[0];
            let notifications = [];

            // 2. Generate Notifications based on task data
            userTasks.forEach(task => {
                if (!task.dueDate) return;

                if (task.status === 'completed') {
                    // Completed Tasks (Updates)
                    notifications.push({
                        type: 'updates',
                        title: `Task Completed!`,
                        message: `You successfully completed "${task.title}". Great job!`,
                        icon: 'fa-circle-check',
                        iconColor: '#54CBB2', // Teal
                        time: 'Recent'
                    });
                } else if (task.dueDate === todayStr) {
                    // Due Today (Reminders)
                    notifications.push({
                        type: 'reminders',
                        title: `Due Today: ${task.title}`,
                        message: `Don't forget to submit this ${task.category} task by the end of the day.`,
                        icon: 'fa-calendar-day',
                        iconColor: '#EED663', // Yellow
                        time: 'Today'
                    });
                } else if (task.dueDate < todayStr) {
                    // Overdue (Updates/Alerts)
                    notifications.push({
                        type: 'updates',
                        title: `Overdue Alert: ${task.title}`,
                        message: `This task was due on ${task.dueDate}. Please update its status!`,
                        icon: 'fa-triangle-exclamation',
                        iconColor: '#EAA196', // Salmon/Red
                        time: 'Overdue'
                    });
                }
            });

            // 3. Function to render notifications to the screen
            const feedContainer = document.getElementById('notifications-feed');
            
            function renderFeed(filterType) {
                feedContainer.innerHTML = ''; // Clear current
                
                const filtered = filterType === 'all' 
                    ? notifications 
                    : notifications.filter(n => n.type === filterType);

                if (filtered.length === 0) {
                    feedContainer.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #888; font-size: 14px; border: 1px dashed #F4B2BB; border-radius: 12px;">
                            <i class="fa-regular fa-bell-slash" style="font-size: 24px; margin-bottom: 10px; color: #F5AFAF;"></i><br>
                            You have no ${filterType === 'all' ? 'new' : filterType} notifications right now.
                        </div>
                    `;
                    return;
                }

                filtered.forEach(notif => {
                    feedContainer.innerHTML += `
                        <div style="background-color: #FFFFFF; border: 1px solid #F4B2BB; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; transition: transform 0.2s; cursor: pointer;">
                            <div style="background-color: #FBEFEF; min-width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: ${notif.iconColor}; font-size: 16px; border: 1px solid rgba(0,0,0,0.05);">
                                <i class="fa-solid ${notif.icon}"></i>
                            </div>
                            <div style="flex-grow: 1;">
                                <h4 style="margin: 0 0 4px 0; font-size: 14px; font-weight: 700; color: #000000;">${notif.title}</h4>
                                <p style="margin: 0; font-size: 12px; color: #555555;">${notif.message}</p>
                            </div>
                            <div style="font-size: 11px; font-weight: 500; color: #888888; white-space: nowrap;">
                                ${notif.time}
                            </div>
                        </div>
                    `;
                });
            }

            // 4. Handle Filter Button Clicks
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Reset all buttons to inactive style
                    buttons.forEach(b => {
                        b.style.backgroundColor = '#FFFFFF';
                        b.style.fontWeight = '500';
                        b.classList.remove('active');
                    });
                    
                    // Set clicked button to active style
                    e.target.style.backgroundColor = '#F5AFAF';
                    e.target.style.fontWeight = '600';
                    e.target.classList.add('active');

                    // Render the filtered feed
                    const filterValue = e.target.getAttribute('data-filter');
                    renderFeed(filterValue);
                });
            });

            // Initial render (Show 'All')
            renderFeed('all');
        });
    </script>
</body>
</html>
