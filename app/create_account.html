<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskaholic - Create an Account</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Laila:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <div class="form-panel">
            <div class="form-header-left">
                <h2>Create an account</h2>
                <p>Join the campus community today</p>
            </div>

            <form action="#" class="auth-form" id="register-form">
                <div class="input-wrapper">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="register-name" placeholder="Enter your Full Name" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Your email</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="register-email" placeholder="Enter your gbox account" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="register-password" placeholder="Create your password" required>
                        <i class="fa-regular fa-eye show-password-icon"></i>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="register-confirm" placeholder="Confirm your password" required>
                        <i class="fa-regular fa-eye show-password-icon"></i>
                    </div>
                </div>

                <button type="submit" class="auth-btn">Get Started</button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html" class="accent-link">Login</a></p>
            </div>
        </div>

        <div class="brand-panel">
            <div class="brand-header">
                <h1 class="logo-title">Taskaholic</h1>
                <p class="brand-subtitle">Smart Campus<br>Student Task Management</p>
            </div>
            
            <div class="logo-container">
                <img src="LOGO 2.png" alt="Taskaholic Ribbon Logo" class="main-logo">
            </div>

            <div class="brand-footer-centered">
                <h2>Get started with your<br>personal productivity hub</h2>
                <p>Access your tasks, notes, and projects<br>anytime, anywhere</p>
            </div>
        </div>
    </div>

    <script type="module" src="register.js"></script>

    <script>
        document.querySelectorAll('.show-password-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                // Find the input field that is immediately before the icon
                const input = this.previousElementSibling;
                
                if (input.type === 'password') {
                    input.type = 'text';
                    // Swap icon to eye-slash
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    // Swap icon back to eye
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });
    </script>
</body>
</html>
