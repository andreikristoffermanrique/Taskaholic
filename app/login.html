<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskaholic - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Laila:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <div class="brand-panel">
            <div class="brand-header">
                <h1 class="logo-title">Taskaholic</h1>
                <p class="brand-subtitle">Smart Campus<br>Student Task Management</p>
            </div>
            
            <div class="logo-container">
                <img src="LOGO 2.png" alt="Taskaholic Ribbon Logo" class="main-logo">
            </div>

            <div class="brand-footer-left">
                <h2>Login to your account</h2>
                <p>Access your tasks, notes, and projects anytime, anywhere</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header-center">
                <h2>Welcome Back, Andrei!</h2>
                <p>We're happy to see you again!</p>
            </div>

            <form action="#" class="auth-form" id="login-form">
                <div class="input-group">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="login-email" placeholder="Gbox account" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <i class="fa-regular fa-eye show-password-icon"></i>
                </div>

                <label class="remember-me">
                    <input type="checkbox">
                    Remember Me
                </label>

                <button type="submit" class="auth-btn">Log In</button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="create_account.html" class="accent-link">Create an account</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
